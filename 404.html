  <!--
    Faye Voice additions (per src/features/fayeVoice + voice-service/):
      - script-src  *.daily.co     → @pipecat-ai/small-webrtc-transport pulls in
                                     @daily-co/daily-js which fetches a remote
                                     "call object bundle" from c.daily.co at runtime.
                                     No SDK opt-out exists. Sentry telemetry from the
                                     same bundle stays blocked (separate domain).
      - script-src  'unsafe-eval'  → Daily's call-machine bundle uses eval() / new
                                     Function() internally. Without 'unsafe-eval'
                                     the bundle loads but fails to evaluate.
                                     Tradeoff: weakens XSS posture (combined with
                                     existing 'unsafe-inline'). Scoped to this app
                                     only because Faye Voice can't function without
                                     it. Revisit if Daily ever ships a CSP-safe
                                     build (WASM-based or eval-free).
      - connect-src *.daily.co     → Daily's signaling + telemetry endpoints.
      - connect-src *.fly.dev      → voice-service/ Fly.io app (prod).
                                     `*.run.app` is kept for now in case we
                                     ever spin Cloud Run back up for diagnostics,
                                     but the active prod URL is *.fly.dev.
      - media-src   blob:          → Pipecat audio playback may surface tracks as
                                     blob URLs via MediaStream.
      - worker-src 'self' blob:    → Daily-js uses Web Workers, some via blob:.
      - script-src  blob:          → Daily injects AudioWorklets from blob URLs.
                                     `script-src-elem` fallback uses `script-src`
                                     so this directive must list blob: too.

    Sentry (crash detection, added 2026-06-16):
      - connect-src o4511446009184256.ingest.us.sentry.io
                                   → @sentry/react envelope POSTs (tag app=weaverportal).
                                     EXACT host, shared by all 3 Weaver Sentry projects
                                     (same org, us region). WITHOUT it every envelope is
                                     silently CSP-blocked → Portal telemetry is DOA (this
                                     meta CSP ships in the built dist/index.html, so it
                                     governs prod on GitHub Pages too). Kept exact, not a
                                     wildcard, so Daily's own bundled Sentry (different org
                                     host) stays blocked per the note above.
  -->
